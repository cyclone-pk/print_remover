name: print_remover
description: Automatically removes all print() and debugPrint() statements from Dart files. Supports dry-run, custom paths, and verbose output.
version: 1.1.1
homepage:  https://github.com/cyclone-pk/print_remover

environment:
  sdk: '>=2.18.1 <4.0.0'

dependencies:
   args: ^2.7.0

dev_dependencies:
  lints: ^2.0.0
  test: ^1.16.0
